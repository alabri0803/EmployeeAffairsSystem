{% load i18n %}

<style>
    .login-container {
        max-width: 400px;
        margin: 50px auto;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        direction: rtl;
    }
    .login-container h2, .login-container h3 {
        text-align: center;
        color: #2c3e50;
    }
    .form-group {
        margin-bottom: 15px;
    }
    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }
    .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
    }
    .btn-submit {
        width: 100%;
        padding: 10px;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
    }
    .btn-submit:hover {
        background-color: #2980b9;
    }
</style>

<div class="login-container">
    <h2>{% trans "نظام شؤون الموظفين" %}</h2>
    <h3>{% trans "تسجيل الدخول" %}</h3>

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">{% trans "اسم المستخدم" %}:</label>
            <input type="text" name="username" id="id_username" required>
        </div>
        <div class="form-group">
            <label for="id_password">{% trans "كلمة المرور" %}:</label>
            <input type="password" name="password" id="id_password" required>
        </div>
        <button type="submit" class="btn-submit">{% trans "دخول" %}</button>
    </form>
</div>
