{% load i18n static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="login-container">
        <i class="fas fa-users-cog fa-3x" style="margin-bottom: 20px;"></i>
        <h2>{% trans "نظام شؤون الموظفين" %}</h2>
        <h3>{% trans "تسجيل الدخول" %}</h3>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">{% trans "اسم المستخدم" %}</label>
                <i class="fas fa-user"></i>
                <input type="text" name="username" id="id_username" required placeholder="{% trans 'أدخل اسم المستخدم' %}">
            </div>
            <div class="form-group">
                <label for="id_password">{% trans "كلمة المرور" %}</label>
                <i class="fas fa-lock"></i>
                <input type="password" name="password" id="id_password" required placeholder="{% trans 'أدخل كلمة المرور' %}">
            </div>
            <button type="submit" class="btn-submit">
                {% trans "دخول" %} <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>
            </button>
        </form>
    </div>
</body>
</html>
