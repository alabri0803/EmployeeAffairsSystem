{% extends 'base.html' %}
{% load static %}

{% block title %}الصفحة غير موجودة - 404{% endblock %}

{% block content %}
<div class="container text-center" style="padding: 100px 0;">
    <div class="error-template">
        <h1 style="font-size: 100px; color: #dc3545;">404</h1>
        <h2 class="mb-4">عذراً، الصفحة غير موجودة</h2>
        <div class="error-details mb-4">
            يبدو أن الصفحة التي تبحث عنها قد تمت إزالتها أو تم تغيير اسمها أو أنها غير متاحة مؤقتاً.
        </div>
        <div class="error-actions">
            <a href="{% url 'home' %}" class="btn btn-primary btn-lg">
                <i class="fas fa-home"></i> العودة للرئيسية
            </a>
        </div>
    </div>
</div>
{% endblock %}
