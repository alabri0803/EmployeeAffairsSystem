<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HR System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; min-height: 100vh; flex-direction: column; }
        .main-container { display: flex; flex: 1; }
        .content-area { flex: 1; padding: 20px; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include 'navbar.html' %}

    <div class="container-fluid main-container">
        <div class="row w-100">
            <div class="col-md-3 col-lg-2 p-0 border-end bg-light">
                {% include 'sidebar.html' %}
            </div>
            <main class="col-md-9 col-lg-10 content-area">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3">
        <p>&copy; 2023 Employee Affairs System</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById("name_ar").addEventListener("blur", function() {
            fetch('/translate/?text=' + this.value)
                .then(res => res.json())
                .then(data => {
                    document.getElementById("name_en").value = data.text;
                });
        });
    </script>
</body>
</html>
